gcode:


[gcode_macro UNLOAD_FILAMENT_CLEAN]
variable_unload_distance: 85
variable_purge_distance:  25
variable_PURGE_TEMP: 220     ; Temperature to extrude at
gcode:
    STATUS_HEATING
    G1 X280 Y300 Z10 F7200   ; Park in the corner to purge
    G1 Z1
    {% set PURGE_TEMP = params.PURGE_TEMP|float %}    ; Set the extrude to the called temp. Must be floating point for TEMPERATURE_WAIT
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 10 %} #60
    SAVE_GCODE_STATE NAME=unload_state
    M104 S{PURGE_TEMP}       ; Heat up the hotend
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={PURGE_TEMP|float -2} MAXIMUM={PURGE_TEMP|float +5}   ; Wait for temperature to stabilize within range
    STATUS_BUSY
    G91                      ; Relative extruder positioning
    G92 E0                   ; Zero the extruder
    
    G1 E{purge_distance} F{speed} # purge
    G1 E-{unload_distance} F{max_velocity} # fast-unload
    RESTORE_GCODE_STATE NAME=unload_state
    M104 S170                ; Start cooling down, but stay warm so the plastic can be wiped
    clean_nozzle             ; Use the right macro! Not wipe_nozzle 
    STATUS_STANDBY
    M104 S0                  ; Finish cooling

[gcode_macro LOAD_FILAMENT_CLEAN]
variable_load_distance:  80
variable_purge_distance:  25
variable_PURGE_TEMP: 220     ; Temperature to extrude at
gcode:
    STATUS_HEATING
    G1 X280 Y300 Z10 F7200   ; Park in the corner to purge
    G1 Z1
    {% set PURGE_TEMP = params.PURGE_TEMP|float %}    ; Set the extrude to the called temp. Must be floating point for TEMPERATURE_WAIT
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 10 %} #60
    SAVE_GCODE_STATE NAME=load_state
    M104 S{PURGE_TEMP}       ; Heat up the hotend
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={PURGE_TEMP|float -2} MAXIMUM={PURGE_TEMP|float +5}   ; Wait for temperature to stabilize within range
    STATUS_BUSY
    G91                      ; Relative extruder positioning
    G92 E0                   ; Zero the extruder
    G1 E{load_distance} F{max_velocity} # fast-load
    G1 E{purge_distance} F{speed} # purge
    RESTORE_GCODE_STATE NAME=load_state
    M104 S170                ; Start cooling down, but stay warm so the plastic can be wiped
    clean_nozzle             ; Use the right macro! Not wipe_nozzle
    STATUS_STANDBY
    M104 S0                  ; Finish cooling

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  80
variable_purge_distance:  25
gcode:
