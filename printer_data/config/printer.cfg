# This file contains common pin mappings for the BIGTREETECH Manta M8P V1.0
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# This config is currently only correct for V1.0 boards
# 
# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]
#[include config_backup.cfg]
[include KAMP_Settings.cfg]
[include led_effects.cfg]
[include my_macros.cfg]
[include timelapse.cfg]
[include homing.cfg]
[include autotune_tmc.cfg]

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 30000
minimum_cruise_ratio: 0.5    # Accel to decel replacement
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 12

[force_move]
enable_force_move: True

[axis_twist_compensation]

[exclude_object]

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_06003C000A504B4633373520-if00
canbus_uuid: 7beef97caea6
canbus_interface: can0

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00
canbus_uuid: d903f7d8d455
canbus_interface: can0

[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
#serial: /dev/serial/by-id/usb-cartographer_cartographer_
canbus_uuid: 373c9be0ad86

[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: -15 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes # For extra output

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[bed_mesh]
zero_reference_position: 150, 150 # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 10, -5 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 290, 235 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 100, 100
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough


#####################################################################
# 	X/Y Stepper Settings
#####################################################################

# X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE2
dir_pin: PB4
enable_pin: !PC11
microsteps: 64
rotation_distance: 40
full_steps_per_rotation:200
endstop_pin: tmc2209_stepper_x:virtual_endstop # Used to be ^EBBCan: PB8. the endstop input needs a pull up resistor. The switch connects it to ground.

position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC10
interpolate: True
run_current: 0.8
sense_resistor: 0.110
diag_pin: ^PF3
driver_SGTHRS: 110

# Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PF12
dir_pin: PF11
enable_pin: !PB3
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop #^PF4
full_steps_per_rotation:200

position_min: -15
position_endstop: 300
position_max: 300
homing_speed: 80
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PF13
interpolate: True
run_current: 0.8
sense_resistor: 0.110
diag_pin: ^PF4
driver_SGTHRS: 120

#####################################################################
# 	Z Stepper Settings
#####################################################################

# Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PD7
dir_pin: PD6
enable_pin: !PF10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

endstop_pin: probe:z_virtual_endstop
position_max: 290
position_min: -2
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PF9
interpolate: True
run_current: 0.8
sense_resistor: 0.110

#	Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PD3
dir_pin: !PD2
enable_pin: !PD5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD4
interpolate: True
run_current: 0.8
sense_resistor: 0.110

#	Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PC9 
dir_pin: PC8
enable_pin: !PD1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PD0
interpolate: True
run_current: 0.8
sense_resistor: 0.110

#	Z3 Stepper - Front Right on Motor7
[stepper_z3]
step_pin: PA10
dir_pin: !PA14
enable_pin: !PA15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PF8
interpolate: True
run_current: 0.8
sense_resistor: 0.110

#####################################################################
# 	extruder
#####################################################################

[temperature_sensor EBBCan]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
rotation_distance: 4.637
microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: EBBCan: PB13
max_extrude_cross_section: 5
max_extrude_only_velocity: 120
max_extrude_only_accel: 8000
max_extrude_only_distance: 500

#	thermistor settings
sensor_type: PT1000
sensor_pin: EBBCan: PA3
pullup_resistor: 2200
min_temp: -270
max_temp: 350

max_power: 1.0
min_extrude_temp: 170
control: pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721
##	Try to keep pressure_advance below 1.0
#pressure_advance: 0.03
#	Default is 0.040, leave stock
pressure_advance_smooth_time: 0.020

#	oancake stepper
[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.85
hold_current: 0.100
sense_resistor: 0.11
interpolate: true
driver_TBL: 0 
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4


[firmware_retraction]
retract_length: 1
retract_speed: 50
unretract_extra_length: 0
unretract_speed: 50

#####################################################################
#   Filament Runout Sensor
#####################################################################

#[filament_switch_sensor filament_sensor]
#switch_pin: EBBCan:gpio21
#pause_on_runout: True
#insert_gcode:
#    { action_respond_info("Insert Detected") }
#runout_gcode:
#    { action_respond_info("Runout Detected") }

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed] # Voron sample
##	SSR Pin - HE1
heater_pin: PB5 
sensor_type: Generic 3950
sensor_pin: PA0
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 1
min_temp: 0
max_temp: 120
control: pid

#####################################################################
# 	Chamber
#####################################################################

[temperature_sensor chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA1
pullup_resistor: 4700


#####################################################################
# 	Fan Control
#####################################################################

# Part cooling fan
[fan]
pin: EBBCan: PA0

[fan_generic nevermore]
#   Controller fan - CNC_FAN4
pin: PE3
max_power: 1.0

#[fan_generic BedFans]
# Controller fan - CNC_FAN3
#pin: PC12
#max_power: 1.0
#kick_start_time: 0.5

[heater_fan PCU_fan]
#   Controller fan - CNC_FAN1
pin: PE6
max_power: 1.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 30
fan_speed: 1

[heater_fan PCU_fan1]
#   Controller fan - CNC_FAN2
pin: PE0
max_power: 1.0
kick_start_time: 5.0
heater: heater_bed
heater_temp: 30
fan_speed: 1

#[heater_fan fan6]
#pin: PB9
#tachometer_pin: PC15

#####################################################################
# 	LED Control
#####################################################################

[output_pin Printer_Lights]
# Chamber Lighting - HE2 Connector (Optional)
pin: PB6
pwm:true
shutdown_value: 0
value: 0.0
cycle_time: 0.01

#####################################################################
#   Input Shaper
#####################################################################

[adxl345]
cs_pin: cartographer:PA3 #EBBCan: PB12 
spi_bus: spi1 #for cartographer
#spi_software_sclk_pin: EBBCan: PB10
#spi_software_mosi_pin: EBBCan: PB11
#spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z #z,-y,x


[resonance_tester]
accel_chip: adxl345
probe_points: 150, 150, 20
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
shaper_freq_x: 58.2
shaper_type_x: mzv
shaper_freq_y: 42.2
shaper_type_y: mzv
damping_ratio_x: 0.069
damping_ratio_y: 0.048

[shaketune]
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

#[safe_z_home]
#home_xy_position:150,150
#speed:100
#z_hop:10

[quad_gantry_level]
gantry_corners:        #	Gantry Corners for 300mm Build
	-60,-10
	360,370
points:                #	Probe points
	40,15
	40,240
	260,240
	260,15

speed: 150
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 4

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

